name: Self-Maintaining Repository

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 1 * * *' # Daily at 1 AM

jobs:
  auto-document:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2 # Needed for git diff in ai_doc_agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Run Repository Analyzer
        run: python scripts/repo_analyzer.py

      - name: Run Diagram Generator
        run: python scripts/generate_diagrams.py

      - name: Run AI Documentation Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ai_doc_agent.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md

          # Only commit if there are changes
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update repository documentation and diagrams"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
